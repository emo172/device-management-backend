spring:
  datasource:
    # 为每个 Spring 测试上下文分配独立的 H2 内存库名，避免 @MockitoSpyBean 等场景触发的新上下文
    # 复用固定 mem 库时，前一个上下文残留的表会让后一个上下文重新执行 schema.sql 直接失败。
    url: jdbc:h2:mem:${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  mail:
    # 测试环境保留日志占位发送器，不要求本地 SMTP 可用，但保留字段以对齐配置骨架。
    host: localhost
    port: 2525
    username: test
    password: test
  sql:
    init:
      mode: always
      schema-locations: classpath:testdb/task3-schema.sql
      data-locations: classpath:testdb/task3-data.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
