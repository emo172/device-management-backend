spring:
  application:
    name: device-management-backend
  datasource:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
  data:
    redis:
      timeout: 5s
  mail:
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.jhun.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid

jwt:
  issuer: device-management-backend
  access-token-validity: 86400
  refresh-token-validity: 604800
  secret: device-management-backend-access-secret-key-for-local-dev

reservation:
  open-window-start: 08:00
  open-window-end: 22:00
  min-duration-minutes: 30
  max-duration-days: 7
  check-in-advance-minutes: 30
  check-in-delay-minutes: 30
  check-in-timeout-minutes: 60
  borrow-confirm-timeout-hours: 2
  manual-timeout-hours: 24

overdue:
  warning-threshold-hours: 4
  restricted-threshold-hours: 4
  frozen-threshold-hours: 96

verification-code:
  expire-minutes: 5
  resend-interval-seconds: 60
  daily-limit: 10

storage:
  # 本地上传统一落在 upload-dir，WebMvcConfig 会把该目录映射成 `/files/**` 静态资源出口。
  upload-dir: uploads
  # 数据库存储相对路径而不是固定主机名，避免环境切换时把本地地址写死到业务数据里。
  public-base-url: /files

ai:
  # 该开关只控制新的 `/api/ai/chat` 请求是否允许进入服务层，历史查询与 Prompt 管理接口不受影响。
  enabled: false
  # 当前仅允许 `mock` 与 `qwen` 两种正式值，由运行时配置统一归一化 Provider 选择语义。
  provider: mock
  # 后续 AI Provider 统一沿用该超时基线，避免不同实现各自散落定义请求超时。
  timeout-seconds: 30
  qwen:
    # 统一使用北京地域 DashScope OpenAI 兼容模式地址；如需环境切换，请通过外部配置覆盖而不是改 Java 常量。
    base-url: ${AI_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    # 默认模型骨架指向 qwen-plus，后续环境可按部署要求覆盖。
    model: ${AI_QWEN_MODEL:qwen-plus}
    # API Key 只能通过环境变量或外部配置注入，仓库内不落真实密钥。
    api-key: ${DASHSCOPE_API_KEY:}
    # 首发范围内最多允许 1 次工具调用；当前任务先只完成配置接线，不提前实现工具执行链路。
    max-tool-calls: ${AI_QWEN_MAX_TOOL_CALLS:1}

speech:
  # `speech.enabled` 是语音总开关；关闭时前后端都应优雅回退到文字聊天与历史查看，不触发第三方云语音调用。
  enabled: false
  # v1 只允许 Azure Speech provider，避免配置层给出多供应商已可切换的假象。
  provider: azure
  # 浏览器录音大小上限，与服务层二次校验保持一致，确保超限时返回稳定业务错误。
  max-upload-size-bytes: 10485760
  azure:
    # Azure Speech 真实凭据必须通过外部环境变量注入，仓库内只保留占位；上线前仍需完成第三方云语音合规审批。
    region: ${SPEECH_AZURE_REGION:}
    key: ${SPEECH_AZURE_KEY:}

app:
  cors:
    # 使用逗号分隔的白名单源，供 WebMvc 与 Security 共享同一跨域真相源。
    allowed-origins: http://localhost:3000,http://localhost:5173
