spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      ssl:
        enabled: true
  mail:
    # 生产环境必须配置真实 SMTP，找回密码验证码通过该通道送达最终用户。
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

ai:
  enabled: true

speech:
  # 生产环境语音链路固定为讯飞 ASR-only，`/api/ai/speech/transcriptions` 只返回最终 transcript，
  # 前端收到结果后只回填输入框，仍需用户手动发送。
  enabled: ${SPEECH_ENABLED:false}
  provider: ${SPEECH_PROVIDER:iflytek}
  iflytek:
    # 生产环境真实凭据只通过环境变量注入，仓库内不落任何固定值；一期也不接入 `res_id` 热词。
    app-id: ${SPEECH_IFLYTEK_APP_ID:}
    api-key: ${SPEECH_IFLYTEK_API_KEY:}
    api-secret: ${SPEECH_IFLYTEK_API_SECRET:}
