spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      ssl:
        enabled: true
  mail:
    # 生产环境必须配置真实 SMTP，找回密码验证码通过该通道送达最终用户。
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

ai:
  enabled: true

speech:
  # 生产环境默认继续关闭语音，只有完成 Azure Speech 凭据注入、桌面 Chrome / Edge 验收与合规审批后才允许开启。
  enabled: ${SPEECH_ENABLED:false}
  provider: ${SPEECH_PROVIDER:azure}
  azure:
    # 生产环境真实凭据只通过环境变量注入，仓库内不落任何固定值。
    region: ${SPEECH_AZURE_REGION:}
    key: ${SPEECH_AZURE_KEY:}
