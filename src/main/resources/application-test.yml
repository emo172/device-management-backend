spring:
  datasource:
    # 为每个 Spring 测试上下文分配独立的 H2 内存库名，避免 @MockitoSpyBean 等场景触发的新上下文
    # 复用固定 mem 库时，前一个上下文残留的表会让后一个上下文重新执行 schema.sql 直接失败。
    url: jdbc:h2:mem:${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  mail:
    # 测试环境保留日志占位发送器，不要求本地 SMTP 可用，但保留字段以对齐配置骨架。
    host: localhost
    port: 2525
    username: test
    password: test
  sql:
    init:
      mode: always
      schema-locations: classpath:testdb/task3-schema.sql
      data-locations: classpath:testdb/task3-data.sql

ai:
  # 测试 profile 默认仍保持关闭聊天入口并走 mock provider，避免非 AI 用例被 qwen 条件装配意外牵连。
  enabled: false
  provider: mock
  qwen:
    # 这里显式放入假的 base URL / API Key，只为满足 qwen 条件装配与 fail-fast 校验；
    # 真正的 qwen 集成测试会用 Spring MockitoBean 替换 QwenOpenAiClient，禁止触达真实 DashScope。
    base-url: https://dashscope.test.invalid/compatible-mode/v1
    model: qwen-plus
    api-key: test-dashscope-key
    max-tool-calls: 1

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

speech:
  # 测试 profile 默认继续关闭语音，并使用假凭据占位，确保配置真相源与文档中的 Azure 键保持一致。
  enabled: false
  provider: azure
  azure:
    region: ${SPEECH_AZURE_REGION:test-region}
    key: ${SPEECH_AZURE_KEY:test-speech-key}
