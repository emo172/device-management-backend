version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: device-management-mysql
    environment:
      MYSQL_DATABASE: device_management
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: device-management-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: device-management-backend
    depends_on:
      - mysql
      - redis
    environment:
      # Compose 场景优先使用 dev 配置骨架，再通过环境变量覆盖连接信息，避免把真实生产密钥写入示例文件。
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/device_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 0
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_USERNAME: noreply@example.com
      MAIL_PASSWORD: change-me
      SPEECH_ENABLED: ${SPEECH_ENABLED:-false}
      SPEECH_PROVIDER: ${SPEECH_PROVIDER:-iflytek}
      SPEECH_IFLYTEK_APP_ID: ${SPEECH_IFLYTEK_APP_ID:-}
      SPEECH_IFLYTEK_API_KEY: ${SPEECH_IFLYTEK_API_KEY:-}
      SPEECH_IFLYTEK_API_SECRET: ${SPEECH_IFLYTEK_API_SECRET:-}
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  redis-data:
