spring:
  datasource:
    url: jdbc:mysql://localhost:3306/device_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    # 开发环境真实数据库密码必须通过环境变量或本地私有覆盖提供，禁止把真实凭据提交回仓库。
    # 默认占位值仅用于提醒补齐本地配置，不能作为可依赖的有效口令。
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  mail:
    # 开发环境默认保留日志占位发送器，因此这里主要用于本地联调真实 SMTP 时手动覆盖。
    host: smtp.qq.com
    port: 587
    username: noreply@example.com
    password: change-me
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

ai:
  enabled: ${AI_ENABLED:true}
  provider: ${AI_PROVIDER:qwen}

speech:
  # 开发环境默认继续关闭语音输入转写。
  # 要本地验证当前后端内部链路时，请在本地私有配置或环境变量中同时提供
  # `SPEECH_ENABLED=true` 与讯飞 `APPID / APIKey / APISecret`。
  enabled: ${SPEECH_ENABLED:false}
  provider: ${SPEECH_PROVIDER:iflytek}
  iflytek:
    # 一期只接 `APPID / APIKey / APISecret`，不把 `res_id` 写成必配项，也不要把真实值写回仓库。
    app-id: ${SPEECH_IFLYTEK_APP_ID:}
    api-key: ${SPEECH_IFLYTEK_API_KEY:}
    api-secret: ${SPEECH_IFLYTEK_API_SECRET:}
