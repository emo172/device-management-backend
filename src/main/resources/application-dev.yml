spring:
  datasource:
    url: jdbc:mysql://localhost:3306/device_management?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    # 开发环境真实数据库密码必须通过环境变量或本地私有覆盖提供，禁止把真实凭据提交回仓库。
    # 默认占位值仅用于提醒补齐本地配置，不能作为可依赖的有效口令。
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  mail:
    # 开发环境默认保留日志占位发送器，因此这里主要用于本地联调真实 SMTP 时手动覆盖。
    host: smtp.qq.com
    port: 587
    username: noreply@example.com
    password: change-me
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

speech:
  # 开发环境默认继续关闭语音。要本地验证桌面 Chrome / Edge 语音链路时，再通过外部环境变量补齐 Azure Speech 凭据并手动打开。
  enabled: ${SPEECH_ENABLED:false}
  provider: ${SPEECH_PROVIDER:azure}
  azure:
    # 仅保留真实可绑定的占位键，避免 README 与部署文档引用仓库里不存在的配置名。
    region: ${SPEECH_AZURE_REGION:}
    key: ${SPEECH_AZURE_KEY:}
